    // -------------------- STATO --------------------
    let currentSection = 'recipes';
    let ingredients = [];

    // Inizializzazione dati
    function init() {
      const storedIng = localStorage.getItem('dolcicris_ingredients');
      if (storedIng) {
        ingredients = JSON.parse(storedIng);
      } else {
        ingredients = [...initialIngredients];
        localStorage.setItem('dolcicris_ingredients', JSON.stringify(ingredients));
      }
      selectSection('recipes');
    }

    // Navigazione
    function selectSection(sectionId) {
      currentSection = sectionId;
      
      const sections = ['recipes', 'dolci', 'machines', 'pantry'];
      sections.forEach(s => {
        const btn = document.getElementById(`btn-sec-${s}`);
        if (s === sectionId) {
          btn.className = "touch-target py-5 px-4 rounded-2xl bg-brand-dark text-white font-title font-bold text-lg flex flex-col items-center justify-center gap-2 border-2 border-brand-dark shadow-md active:scale-95 transition-all";
        } else {
          btn.className = "touch-target py-5 px-4 rounded-2xl bg-slate-100 text-brand-dark font-title font-bold text-lg flex flex-col items-center justify-center gap-2 border-2 border-slate-200 active:scale-95 transition-all";
        }
      });

      render();
    }

    // Controlla disponibilità ingredienti
    function checkAvailability(recipe) {
      let missingCount = 0;
      recipe.ingredients.forEach(req => {
        const match = ingredients.find(p => p.name.toLowerCase().includes(req.name.toLowerCase().split(' (')[0]));
        if (req.name.toLowerCase() !== 'acqua' && (!match || match.quantity < req.quantity)) {
          missingCount++;
        }
      });
      return missingCount;
    }

    // Aggiungi ingrediente
    function saveNewIngredient() {
      const nameInput = document.getElementById('new-ing-name');
      const qtyInput = document.getElementById('new-ing-qty');
      const unitSelect = document.getElementById('new-ing-unit');
      const criticalCheck = document.getElementById('new-ing-critical');

      const name = nameInput.value.trim();
      const qty = parseFloat(qtyInput.value) || 0;
      const unit = unitSelect.value;
      const isCritical = criticalCheck.checked;

      if (!name) {
        alert('Inserisci il nome del prodotto!');
        return;
      }

      const newId = 'ing-' + Math.random().toString(36).substr(2, 9);
      ingredients.push({
        id: newId,
        name: name,
        quantity: qty,
        unit: unit,
        isCritical: isCritical
      });

      // Ordina per nome
      ingredients.sort((a, b) => a.name.localeCompare(b.name));

      localStorage.setItem('dolcicris_ingredients', JSON.stringify(ingredients));
      
      // Resetta campi
      nameInput.value = '';
      qtyInput.value = '';
      criticalCheck.checked = false;

      closePantryModal();
      render();
    }

    // Regola quantità
    function adjustQty(id, delta) {
      const ing = ingredients.find(i => i.id === id);
      if (ing) {
        ing.quantity = Math.max(0, ing.quantity + delta);
        localStorage.setItem('dolcicris_ingredients', JSON.stringify(ingredients));
        document.getElementById(`qty-val-${id}`).innerText = `${ing.quantity} ${ing.unit}`;
        
        // Colora se critico scarso
        const ingCard = document.getElementById(`ing-card-${id}`);
        if (ing.isCritical && ing.quantity <= 10) {
          ingCard.className = "p-4.5 bg-orange-50 border-2 border-orange-200 rounded-2xl flex items-center justify-between shadow-xs";
        } else {
          ingCard.className = "p-4.5 bg-slate-50 border border-slate-200 rounded-2xl flex items-center justify-between shadow-xs";
        }
      }
    }

    // Rimuovi ingrediente
    function deleteIngredient(id) {
      if (confirm('Sei sicuro di voler eliminare questo prodotto dalla dispensa?')) {
        ingredients = ingredients.filter(i => i.id !== id);
        localStorage.setItem('dolcicris_ingredients', JSON.stringify(ingredients));
        render();
      }
    }

    // Modali
    function openRecipeModal(recipeId) {
      const recipe = initialRecipes.find(r => r.id === recipeId);
      if (!recipe) return;

      const modal = document.getElementById('recipe-modal');
      const content = document.getElementById('modal-content-area');

      let ingList = '';
      recipe.ingredients.forEach(ing => {
        const match = ingredients.find(p => p.name.toLowerCase().includes(ing.name.toLowerCase().split(' (')[0]));
        const isOk = ing.name.toLowerCase() === 'acqua' || (match && match.quantity >= ing.quantity);
        ingList += `
          <div class="flex justify-between py-2 border-b text-lg border-slate-100">
            <span class="font-medium text-slate-800">${ing.name}</span>
            <span class="font-bold text-slate-900 bg-slate-50 border px-3 py-0.5 rounded-lg ${isOk ? '' : 'text-red-600 bg-red-50 border-red-200'}">
              ${ing.quantity}${ing.unit}
            </span>
          </div>
        `;
      });

      let stepsList = '';
      recipe.steps.forEach((step, idx) => {
        stepsList += `
          <div class="flex gap-3 text-lg leading-relaxed text-slate-800">
            <span class="text-brand-accent font-extrabold text-xl">${idx + 1}.</span>
            <p>${step}</p>
          </div>
        `;
      });

      content.innerHTML = `
        <div class="space-y-6">
          <div>
            <span class="px-3 py-1 bg-brand-dark text-white rounded-full text-xs font-bold uppercase tracking-wider">${recipe.category}</span>
            <h2 class="font-title text-2xl font-bold text-brand-dark mt-2">${recipe.title}</h2>
            <p class="text-base text-slate-500 mt-1">${recipe.description}</p>
          </div>

          <!-- MACROS -->
          <div class="grid grid-cols-2 gap-4 bg-slate-50 p-4 rounded-2xl border">
            <div class="text-center">
              <span class="text-xs text-slate-400 font-bold uppercase">Proteine</span>
              <span class="block text-2xl font-extrabold text-brand-dark">${recipe.protein}</span>
            </div>
            <div class="text-center border-l">
              <span class="text-xs text-slate-400 font-bold uppercase">Calorie</span>
              <span class="block text-2xl font-extrabold text-brand-dark">${recipe.kcal} kcal</span>
            </div>
          </div>

          <!-- SEZIONE INGREDIENTI -->
          <div class="space-y-3">
            <h3 class="font-title text-xl font-bold text-brand-dark flex items-center gap-2">
              📋 Ingredienti
            </h3>
            <div class="space-y-1">
              ${ingList}
            </div>
          </div>

          <!-- PROCEDIMENTO -->
          <div class="space-y-4">
            <h3 class="font-title text-xl font-bold text-brand-dark">
              ⚡ Procedimento
            </h3>
            <div class="space-y-4">
              ${stepsList}
            </div>
          </div>

          <!-- CHICCHE E TIPS -->
          <div class="bg-accent-orange/15 border-2 border-accent-orange/30 p-5 rounded-2xl space-y-2">
            <h4 class="font-title font-bold text-lg text-brand-dark flex items-center gap-1.5">
              💡 Chicche e Tips del Socio
            </h4>
            <p class="text-base text-slate-800 leading-relaxed font-medium">
              ${recipe.tips}
            </p>
          </div>
        </div>
      `;

      modal.classList.remove('hidden');
      document.body.classList.add('overflow-hidden');
    }

    function closeRecipeModal() {
      document.getElementById('recipe-modal').classList.add('hidden');
      document.body.classList.remove('overflow-hidden');
    }

    function openPantryModal() {
      document.getElementById('pantry-modal').classList.remove('hidden');
    }

    function closePantryModal() {
      document.getElementById('pantry-modal').classList.add('hidden');
    }

    // -------------------- SCHERMATE DI RENDERING --------------------
    function render() {
      const content = document.getElementById('section-content');

      // --- SECTION GELATI ---
      if (currentSection === 'recipes') {
        let cards = '';
        initialRecipes.forEach(recipe => {
          const missingCount = checkAvailability(recipe);
          const isReady = missingCount === 0;

          cards += `
            <div onclick="openRecipeModal('${recipe.id}')" class="p-5 bg-white border-2 border-slate-200 rounded-3xl shadow-sm hover:shadow-md active:scale-[0.98] transition-all cursor-pointer space-y-4">
              <div class="flex justify-between items-start">
                <span class="px-2.5 py-0.5 bg-slate-100 text-brand-dark rounded-md text-[11px] font-extrabold uppercase font-mono tracking-wider">${recipe.programUsed}</span>
                <span class="text-sm font-bold text-emerald-600 bg-emerald-50 px-2.5 py-1 rounded-full flex items-center gap-1">
                  💪 ${recipe.protein}
                </span>
              </div>
              
              <div>
                <h3 class="font-title text-xl font-bold text-brand-dark leading-tight">${recipe.title}</h3>
                <p class="text-sm text-slate-500 mt-1 line-clamp-2">${recipe.description}</p>
              </div>

              <div class="pt-3 border-t border-slate-100 flex justify-between items-center">
                ${isReady 
                  ? `<span class="text-sm text-emerald-700 font-bold flex items-center gap-1">✓ Pronto da preparare</span>`
                  : `<span class="text-sm text-accent-orange font-bold flex items-center gap-1">⚠️ Mancano ${missingCount} ingredienti</span>`
                }
                <span class="text-xs font-bold text-brand-accent flex items-center gap-0.5">Apri ricetta →</span>
              </div>
            </div>
          `;
        });

        content.innerHTML = `
          <div class="space-y-5">
            <h2 class="font-title text-2xl font-bold text-brand-dark">Scegli il tuo Gelato</h2>
            <div class="space-y-4">
              ${cards}
            </div>
          </div>
        `;
      }

      // --- SECTION DOLCI ---
      else if (currentSection === 'dolci') {
        content.innerHTML = `
          <div class="space-y-6 py-6 text-center">
            <div class="text-5xl">🍰</div>
            <h2 class="font-title text-2xl font-bold text-brand-dark">Dolci Fit & Pasticceria</h2>
            <div class="bg-amber-50 border-2 border-amber-200 p-6 rounded-3xl space-y-3">
              <p class="text-base text-amber-900 leading-relaxed font-semibold">
                Questa sezione è in fase di definizione (<strong>TBD</strong>).
              </p>
              <p class="text-sm text-amber-800 leading-relaxed">
                Qui inseriremo le ricette dei dolci da forno e pasticceria fit non appena avremo bilanciato gli ingredienti con il Socio. Stay tuned!
              </p>
            </div>
          </div>
        `;
      }

      // --- SECTION MACCHINE ---
      else if (currentSection === 'machines') {
        content.innerHTML = `
          <div class="space-y-5">
            <h2 class="font-title text-2xl font-bold text-brand-dark">Attrezzatura Cucina</h2>
            
            <div class="space-y-4">
              <div class="p-5 bg-slate-50 border border-slate-200 rounded-3xl space-y-3 shadow-xs">
                <div class="flex justify-between items-center">
                  <h3 class="font-title text-lg font-bold text-brand-dark">Moulinex Dolci</h3>
                  <span class="px-2.5 py-0.5 bg-emerald-100 text-emerald-800 rounded text-xs font-bold">1-Step Perfector</span>
                </div>
                <p class="text-sm text-slate-600 leading-relaxed">
                  Sistema a raschiamento di blocchi congelati (stile pinta/puck). Perfetto per gelati e sorbetti cremosi.
                </p>
                <div class="pt-2">
                  <span class="text-xs font-bold text-slate-400 block mb-1 uppercase tracking-wider">Programmi Disponibili:</span>
                  <div class="flex flex-wrap gap-1.5">
                    <span class="bg-white border px-2 py-1 rounded text-xs font-semibold">Gelato</span>
                    <span class="bg-white border px-2 py-1 rounded text-xs font-semibold">Sorbetto</span>
                    <span class="bg-white border px-2 py-1 rounded text-xs font-semibold">Yogurt Gelato</span>
                    <span class="bg-white border px-2 py-1 rounded text-xs font-semibold">Granita</span>
                    <span class="bg-white border px-2 py-1 rounded text-xs font-semibold text-brand-accent">MIX (per Mix-in)</span>
                    <span class="bg-white border px-2 py-1 rounded text-xs font-semibold">Re-spin</span>
                  </div>
                </div>
              </div>

              <div class="p-5 bg-slate-50 border border-slate-200 rounded-3xl space-y-3 shadow-xs">
                <div class="flex justify-between items-center">
                  <h3 class="font-title text-lg font-bold text-brand-dark">Russell Hobbs Adventure</h3>
                  <span class="px-2.5 py-0.5 bg-amber-100 text-amber-800 rounded text-xs font-bold">Caffè Filtro</span>
                </div>
                <p class="text-sm text-slate-600 leading-relaxed">
                  Macchina per caffè americano. Utilizzata per estrazioni calde a circa 85°C, perfette per idratare e attivare il Neutro per gelati ed evitare grumi.
                </p>
              </div>
            </div>
          </div>
        `;
      }

      // --- SECTION DISPENSA ---
      else if (currentSection === 'pantry') {
        let listHtml = '';
        ingredients.forEach(ing => {
          const isLow = ing.isCritical && ing.quantity <= 10;
          listHtml += `
            <div id="ing-card-${ing.id}" class="p-4.5 rounded-2xl flex items-center justify-between shadow-xs transition-all ${
              isLow 
                ? 'bg-orange-50 border-2 border-orange-200' 
                : 'bg-slate-50 border border-slate-200'
            }">
              <div class="min-w-0 flex-1 pr-3">
                <span class="font-bold text-lg text-brand-dark block truncate leading-tight">${ing.name}</span>
                <div class="flex gap-2 items-center mt-1">
                  ${ing.isCritical ? `<span class="bg-red-100 text-red-800 font-extrabold text-[9px] uppercase tracking-wider px-1.5 py-0.5 rounded">Fondamentale</span>` : ''}
                  ${isLow ? `<span class="bg-orange-100 text-orange-800 font-extrabold text-[9px] uppercase tracking-wider px-1.5 py-0.5 rounded">Scorte Basse</span>` : ''}
                </div>
              </div>

              <!-- Controlli Grandi e Rimuovi -->
              <div class="flex items-center gap-3">
                <div class="flex items-center bg-white border border-slate-200 rounded-xl p-0.5">
                  <button onclick="adjustQty('${ing.id}', -10)" class="touch-target w-10 h-10 text-xl font-bold text-slate-600 rounded-lg active:bg-slate-100 flex items-center justify-center">-</button>
                  <span id="qty-val-${ing.id}" class="w-16 text-center font-mono font-bold text-base text-slate-800">${ing.quantity} ${ing.unit}</span>
                  <button onclick="adjustQty('${ing.id}', 10)" class="touch-target w-10 h-10 text-xl font-bold text-slate-600 rounded-lg active:bg-slate-100 flex items-center justify-center">+</button>
                </div>
                
                <button onclick="deleteIngredient('${ing.id}')" class="touch-target p-2 text-red-500 hover:text-red-700 active:bg-red-50 rounded-xl transition-colors">
                  🗑️
                </button>
              </div>
            </div>
          `;
        });

        content.innerHTML = `
          <div class="space-y-5">
            <div class="flex justify-between items-center">
              <h2 class="font-title text-2xl font-bold text-brand-dark">Dispensa</h2>
              <button onclick="openPantryModal()" class="touch-target px-4 py-2 bg-brand-dark text-white rounded-xl font-title font-bold text-sm shadow-sm active:scale-95 transition-all">
                + Aggiungi Prodotto
              </button>
            </div>

            <div class="space-y-3.5">
              ${listHtml}
            </div>
          </div>
        `;
      }
    }

    // Avvio
    init();
  </script>
</body>
</html>
