          { name: 'Eritritolo', quantity: 35, unit: 'g' },
          { name: 'Neutro per Gelati SaporePuro', quantity: 2.5, unit: 'g' },
        ],
        steps: [
          { stepNumber: 1, instruction: 'Miscela a secco il Neutro SaporePuro e l\'eritritolo.', tempMin: null, tempMax: null },
          { stepNumber: 2, instruction: 'Scalda 50ml di latte a 80-85°C e sciogli la miscela di neutro ed eritritolo frullando col mixer.', tempMin: 80, tempMax: 85 },
          { stepNumber: 3, instruction: 'In una ciotola capiente, diluisci la pasta pura di mandorle con il restante latte freddo (100ml) un po\' alla volta.', tempMin: null, tempMax: null },
          { stepNumber: 4, instruction: 'Unisci lo yogurt greco 0%, le Impact Whey vaniglia, lo sciroppo di neutro caldo e la pasta di mandorla frullando bene.', tempMin: null, tempMax: null },
          { stepNumber: 5, instruction: 'Frulla vigorosamente per ottenere un composto liscio e vellutato.', tempMin: null, tempMax: null },
          { stepNumber: 6, instruction: 'Versa nella pinta e posizionala in freezer per 24 ore.', tempMin: null, tempMax: null },
          { stepNumber: 7, instruction: 'Mantechi col programma "Gelato" sulla Moulinex Dolci.', tempMin: null, tempMax: null },
        ],
        hasMixIn: false,
        mixInInstructions: null,
      },
    ];

    // Mappatura stili categoria
    const categoryStyles = {
      'Gelato': { bg: 'bg-amber-50/80', text: 'text-amber-900', border: 'border-amber-200', textBadge: 'bg-amber-100 text-amber-800' },
      'Sorbetto': { bg: 'bg-cyan-50/80', text: 'text-cyan-900', border: 'border-cyan-200', textBadge: 'bg-cyan-100 text-cyan-800' },
      'Granita': { bg: 'bg-indigo-50/80', text: 'text-indigo-900', border: 'border-indigo-200', textBadge: 'bg-indigo-100 text-indigo-800' },
      'NiceCream': { bg: 'bg-yellow-50/80', text: 'text-yellow-900', border: 'border-yellow-200', textBadge: 'bg-yellow-100 text-yellow-800' }
    };

    const recipeMacros = {
      'Cioccolato Fit Protein': { protein: '28g', kcal: '240' },
      'Malaga Fit (Marsala & Uvetta)': { protein: '18g', kcal: '290' },
      'Crema Caffè Russell-Moulinex': { protein: '32g', kcal: '260' },
      'Sorbetto alla Pesca Matura': { protein: '2g', kcal: '140' },
      'Sorbetto ai Frutti di Bosco "Sanificato"': { protein: '3g', kcal: '150' },
      'Nice Cream Choco-Banana Istantaneo': { protein: '6g', kcal: '230' },
      'Granita Siciliana al Caffè (con Panna)': { protein: '4g', kcal: '180' },
      'Gelato alla Mandorla Siciliano': { protein: '24g', kcal: '380' },
    };

    // -------------------- STATO APPLICAZIONE --------------------
    let currentTab = 'recipes';
    let selectedRecipe = null;
    let completedSteps = {};
    let ingredients = [];
    let trackers = [];

    // Carica dati da localStorage
    function initData() {
      const storedIng = localStorage.getItem('dolcicris_ingredients');
      if (storedIng) {
        ingredients = JSON.parse(storedIng);
      } else {
        ingredients = [...initialIngredients];
        localStorage.setItem('dolcicris_ingredients', JSON.stringify(ingredients));
      }

      const storedTr = localStorage.getItem('dolcicris_trackers');
      if (storedTr) {
        trackers = JSON.parse(storedTr);
      } else {
        trackers = [];
        localStorage.setItem('dolcicris_trackers', JSON.stringify(trackers));
      }
    }

    // Cambia Tab
    function switchTab(tabId) {
      currentTab = tabId;
      selectedRecipe = null;
      completedSteps = {};
      
      // Update classi bottoni
      const tabs = ['recipes', 'freezer', 'pantry', 'trouble'];
      tabs.forEach(t => {
        const btn = document.getElementById(`tab-${t}-btn`);
        if (t === tabId) {
          btn.className = "flex-1 py-2.5 rounded-xl text-xs font-semibold flex flex-col items-center gap-1 transition-all duration-300 bg-white text-brand-dark shadow-md";
        } else {
          btn.className = "flex-1 py-2.5 rounded-xl text-xs font-semibold flex flex-col items-center gap-1 transition-all duration-300 text-slate-500 hover:text-slate-800 relative";
        }
      });

      render();
    }

    // Controlla disponibilità ingredienti
    function checkRecipeAvailability(recipe) {
      const warnings = [];
      let isFullyAvailable = true;

      recipe.ingredients.forEach((reqIng) => {
        const match = ingredients.find(
          (pantry) => pantry.name.toLowerCase().includes(reqIng.name.toLowerCase().split(' (')[0])
        );

        if (!match) {
          if (reqIng.name.toLowerCase() !== 'acqua') {
            warnings.push(`${reqIng.name} non presente`);
            isFullyAvailable = false;
          }
        } else if (match.quantity < reqIng.quantity) {
          warnings.push(`${reqIng.name} insufficiente`);
          if (match.isCritical) {
            isFullyAvailable = false;
          }
        }
      });

      return { isFullyAvailable, warnings };
    }

    // Salva quantità ingrediente
    function handleUpdateQuantity(id, qty) {
      const idx = ingredients.findIndex(i => i.id === id);
      if (idx !== -1) {
        ingredients[idx].quantity = Math.max(0, parseFloat(qty) || 0);
        localStorage.setItem('dolcicris_ingredients', JSON.stringify(ingredients));
        updateBadges();
      }
    }

    // Aggiungi pinta in freezer
    function handleAddPint(recipeId, pintaName) {
      const recipe = initialRecipes.find(r => r.id === recipeId);
      if (!recipe) return;

      const now = new Date();
      const readyAt = new Date(now.getTime() + 24 * 60 * 60 * 1000);
      const isIstantanea = recipe.category === 'NiceCream';

      const newTracker = {
        id: 'tr-' + Math.random().toString(36).substr(2, 9),
        pintaName: (pintaName || `Pinta ${recipe.title}`).trim(),
        recipeId: recipeId,
        recipe: recipe,
        createdAt: now.toISOString(),
        readyAt: (isIstantanea ? now : readyAt).toISOString(),
        isSpun: false
      };

      trackers.push(newTracker);
      localStorage.setItem('dolcicris_trackers', JSON.stringify(trackers));

      // Scala gli ingredienti della ricetta
      recipe.ingredients.forEach((reqIng) => {
        const pantryItem = ingredients.find(
          (pantry) => pantry.name.toLowerCase().includes(reqIng.name.toLowerCase().split(' (')[0])
        );
        if (pantryItem) {
          pantryItem.quantity = Math.max(0, pantryItem.quantity - reqIng.quantity);
        }
      });
      localStorage.setItem('dolcicris_ingredients', JSON.stringify(ingredients));

      alert('Pinta registrata in freezer! Avviato il countdown di 24 ore.');
      switchTab('freezer');
    }

    // Segna pinta come spinnata
    function handleSpinPint(id) {
      const tracker = trackers.find(t => t.id === id);
      if (tracker) {
        tracker.isSpun = true;
        localStorage.setItem('dolcicris_trackers', JSON.stringify(trackers));
        render();
      }
    }

    // Elimina pinta dal tracker
    function handleDeleteTracker(id) {
      trackers = trackers.filter(t => t.id !== id);
      localStorage.setItem('dolcicris_trackers', JSON.stringify(trackers));
      render();
    }

    // Calcola countdown
    function getTimerDetails(tracker) {
      const readyTime = new Date(tracker.readyAt).getTime();
      const startTime = new Date(tracker.createdAt).getTime();
      const nowMs = new Date().getTime();

      const totalDuration = readyTime - startTime;
      const timePassed = nowMs - startTime;
      const timeRemaining = readyTime - nowMs;

      const percentage = Math.min(100, Math.max(0, totalDuration > 0 ? (timePassed / totalDuration) * 100 : 100));
      const isReady = timeRemaining <= 0;

      let countdownStr = '00:00:00';
      if (!isReady && timeRemaining > 0) {
        const hours = Math.floor(timeRemaining / (1000 * 60 * 60));
        const minutes = Math.floor((timeRemaining % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((timeRemaining % (1000 * 60)) / 1000);
        countdownStr = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      }

      return { percentage, isReady, countdownStr };
    }

    // Aggiorna badge notifiche
    function updateBadges() {
      // Badge freezer
      const now = new Date().getTime();
      const readyCount = trackers.filter(t => !t.isSpun && new Date(t.readyAt).getTime() <= now).length;
      const badgeFreezer = document.getElementById('badge-freezer');
      if (readyCount > 0) {
        badgeFreezer.classList.remove('hidden');
      } else {
        badgeFreezer.classList.add('hidden');
      }

      // Badge dispensa (ingredienti critici e scarsi)
      const criticalLowCount = ingredients.filter(i => i.isCritical && i.quantity <= 10).length;
      const badgePantry = document.getElementById('badge-pantry');
      if (criticalLowCount > 0) {
        badgePantry.classList.remove('hidden');
      } else {
        badgePantry.classList.add('hidden');
      }
    }

    // Toggle step completato
    function toggleStep(stepNumber) {
      completedSteps[stepNumber] = !completedSteps[stepNumber];
      const stepText = document.getElementById(`step-text-${stepNumber}`);
      const stepCircle = document.getElementById(`step-circle-${stepNumber}`);
      
      if (completedSteps[stepNumber]) {
        stepText.classList.add('text-slate-400', 'line-through');
        stepCircle.innerHTML = `<svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>`;
        stepCircle.className = "absolute -left-[27px] top-0.5 w-5 h-5 rounded-full flex items-center justify-center bg-emerald-500 border border-emerald-500 text-white shadow-xs";
      } else {
        stepText.classList.remove('text-slate-400', 'line-through');
        stepCircle.innerHTML = stepNumber;
        stepCircle.className = "absolute -left-[27px] top-0.5 w-5 h-5 rounded-full flex items-center justify-center bg-white border border-slate-300 text-slate-600 hover:border-accent-purple";
      }
    }

    // -------------------- RENDER LOGIC --------------------
    function render() {
      const container = document.getElementById('main-content');
      updateBadges();

      // --- TAB RICETTE (E DETTAGLIO) ---
      if (currentTab === 'recipes') {
        if (!selectedRecipe) {

          let html = `
            <div class="space-y-4">

              </div>
              <div class="grid grid-cols-1 gap-4">
          `;

          initialRecipes.forEach((recipe) => {
            const styles = categoryStyles[recipe.category] || categoryStyles['Gelato'];
            const macros = recipeMacros[recipe.title] || { protein: '15g', kcal: '200' };
            const { isFullyAvailable, warnings } = checkRecipeAvailability(recipe);

            html += `
              <div onclick="selectRecipe('${recipe.id}')" class="group relative overflow-hidden rounded-3xl border ${styles.border} ${styles.bg} p-4 shadow-sm hover:shadow-md transition-all duration-300 cursor-pointer flex flex-col justify-between">
                <div>

                        ${recipe.category}
                      </span>
                      <span class="text-[9px] bg-slate-800 text-white px-2 py-0.5 rounded font-mono">
                        ${recipe.programUsed}
                      </span>
                    </div>
                    <div class="flex items-center gap-1 bg-white/90 backdrop-blur px-2.5 py-0.5 rounded-full border border-slate-200/50 shadow-xs">
                      <span class="text-[10px] font-bold text-slate-800">${macros.protein} PRO</span>
                    </div>
                  </div>
                  <h3 class="font-title text-base font-bold text-brand-dark mt-2.5 group-hover:text-accent-purple transition-colors">
                    ${recipe.title}

                </div>
              </div>
            `;
          });

          html += `</div></div>`;
          container.innerHTML = html;
        } else {
          // Dettaglio Ricetta Selezionata
          const recipe = selectedRecipe;

          let ingHtml = '';
          recipe.ingredients.forEach((ing) => {
            const match = ingredients.find(

          let html = `

                  <p class="text-xs text-slate-300 mt-1">${recipe.description}</p>
                  
                  <div class="flex gap-4 mt-4 text-xs font-medium border-t border-slate-700/40 pt-3">
                    <div>

                  </div>
                </div>
              </div>

              <div class="bg-slate-50 rounded-3xl p-5 border border-slate-200/50">
                <h3 class="font-title text-sm font-bold text-brand-dark mb-3 flex items-center gap-1.5">
                  📁 Ingredienti Richiesti
                </h3>
                <ul class="space-y-2 text-xs">
                  ${ingHtml}
                </ul>
              </div>

              <div class="space-y-4">

              ${recipe.hasMixIn

                     <h4 class="font-bold flex items-center gap-1 mb-1 text-amber-900">⚡ Mix-In:</h4>
                     <p class="leading-relaxed">${recipe.mixInInstructions}</p>
                   </div>`
                : ''
              }

              <div class="pt-4 border-t border-slate-200 flex flex-col gap-3">
                ${recipe.category !== 'NiceCream' 
                  ? `<div>
                       <h4 class="text-xs font-bold text-slate-700 mb-2">Avvia il freezer tracker per questa ricetta:</h4>
                       <div class="flex gap-2">
                         <input id="input-pinta-name" type="text" placeholder="es. Malaga Fit in Pinta 1" class="flex-1 border border-slate-300 rounded-xl px-3 py-2 text-xs focus:outline-none focus:ring-1 focus:ring-accent-purple bg-white" />
                         <button onclick="triggerAddPint('${recipe.id}')" class="bg-accent-purple hover:bg-purple-600 text-white font-semibold text-xs px-4 py-2.5 rounded-xl flex items-center gap-1.5 shadow-md">

                         </button>

                  : `<button onclick="triggerAddPint('${recipe.id}', 'Nice Cream')" class="w-full bg-accent-lime hover:bg-lime-400 text-brand-dark font-bold text-xs py-3 rounded-xl flex items-center justify-center gap-1.5 shadow-md">
                       Emulsiona Istantaneamente col programma MIX!
                     </button>`

          trackers.forEach((tr) => {

            trackerRows += `
              <div class="border rounded-3xl p-4 shadow-xs relative overflow-hidden bg-white mb-3.5 ${tr.isSpun ? 'opacity-65' : ''}">

                           <div class="absolute inset-0 flex items-center justify-center text-[10px] font-mono font-bold text-slate-700">
                             ${Math.round(percentage)}%

                      : `<span class="bg-emerald-100 text-emerald-800 p-1.5 rounded-full">✓</span>`
                    }
                  </div>
                </div>

                <div class="mt-4 pt-3 border-t border-slate-100 flex justify-between items-center pl-2 text-xs">
                  <div>

                      ? `<span class="text-emerald-700 font-bold bg-emerald-50 px-2 py-1 rounded-lg">Spinnato & Prontissimo</span>`

                        : `<div class="flex items-center gap-1.5 font-semibold text-cyan-600 bg-cyan-50 px-2.5 py-1 rounded-lg font-mono">

                  <div class="flex gap-2">
                    ${!tr.isSpun

        let selectOptions = '';
        initialRecipes.forEach(r => {
          selectOptions += `<option value="${r.id}">${r.title}</option>`;
        });

        let html = `
          <div class="space-y-5">
            <div class="flex justify-between items-center mb-1">
              <h2 class="font-title text-lg font-bold text-brand-dark">Freezer Tracker Attivo</h2>
              <span class="text-[10px] bg-cyan-100 text-cyan-800 px-2.5 py-1 rounded-full font-medium">Countdown 24 Ore</span>
            </div>

            <div class="bg-slate-50 border border-slate-200/50 rounded-3xl p-5 space-y-3.5">
              <h3 class="font-title text-xs font-bold text-slate-700 uppercase tracking-wider">Metti in Freezer una Nuova Pinta</h3>
              <div class="grid grid-cols-1 gap-3">
                <div>
                  <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1 block">Seleziona Ricetta</label>
                  <select id="select-pinta-recipe" class="w-full border border-slate-300 rounded-xl px-3 py-2 text-xs focus:outline-none focus:ring-1 focus:ring-accent-purple bg-white">
                    ${selectOptions}
                  </select>
                </div>
                <div>
                  <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1 block">Etichetta Pinta</label>
                  <input id="input-pinta-name-manual" type="text" placeholder="es. Málaga Fit in Pinta 1" class="w-full border border-slate-300 rounded-xl px-3 py-2 text-xs focus:outline-none focus:ring-1 focus:ring-accent-purple bg-white" />
                </div>
                <button onclick="triggerAddPintManual()" class="w-full bg-brand-dark hover:bg-slate-800 text-white font-semibold text-xs py-2.5 rounded-xl flex items-center justify-center gap-1.5 shadow-md">
                  Posiziona nel Congelatore
                </button>
              </div>
            </div>

            <div class="space-y-4">
              <h3 class="font-title text-sm font-bold text-brand-dark">Pinte in Congelamento</h3>
              <div class="space-y-3">${trackerRows}</div>
            </div>
          </div>
        `;
        container.innerHTML = html;
      }

      // --- TAB DISPENSA / PANTRY ---
      else if (currentTab === 'pantry') {
        const criticalCount = ingredients.filter(i => i.isCritical && i.quantity <= 10).length;
        
        let warningHtml = '';
        if (criticalCount > 0) {
          warningHtml = `
            <div class="bg-orange-50 border border-orange-200 rounded-3xl p-4.5 text-xs text-orange-950 flex items-start gap-3">
              <div class="shrink-0 mt-0.5 text-orange-600 font-bold text-base">⚠️</div>
              <div>
                <h4 class="font-bold text-orange-900">Attenzione: Ingredienti Critici Scarsi!</h4>
                <p class="mt-1 leading-relaxed">
                  Alcuni elementi necessari (come il Neutro o le Impact Whey) sono sotto la soglia minima di 10.
                </p>
              </div>
            </div>
          `;
        }

        let itemsHtml = '';
        ingredients.forEach((ing) => {
          const isLow = ing.isCritical && ing.quantity <= 10;
          itemsHtml += `
            <div class="p-4 flex items-center justify-between transition-colors ${isLow ? 'bg-orange-50/30' : 'hover:bg-slate-50/50'}">
              <div class="min-w-0 flex-1 mr-3">
                <span class="font-semibold text-xs text-slate-800 block ${isLow ? 'text-orange-900 font-bold' : ''}">
                  ${ing.name}
                </span>
                <div class="flex gap-2.5 mt-1 items-center">
                  ${ing.isCritical ? `<span class="text-[8px] uppercase tracking-wider font-extrabold bg-red-100 text-red-800 px-1.5 py-0.5 rounded">Critico</span>` : ''}
                  <span class="text-[9px] text-slate-400">Unità: ${ing.unit}</span>
                </div>
              </div>

              <div class="flex items-center gap-2">
                <div class="flex items-center border border-slate-300 rounded-xl bg-white p-0.5">
                  <button type="button" onclick="changeQty('${ing.id}', -10)" class="w-7 h-7 text-xs font-bold text-slate-600 rounded-lg hover:bg-slate-100 flex items-center justify-center">-</button>
                  <span id="qty-display-${ing.id}" class="w-12 text-center text-xs font-semibold font-mono">${ing.quantity}</span>
                  <button type="button" onclick="changeQty('${ing.id}', 10)" class="w-7 h-7 text-xs font-bold text-slate-600 rounded-lg hover:bg-slate-100 flex items-center justify-center">+</button>
                </div>
              </div>
            </div>
          `;
        });

        let html = `
          <div class="space-y-5">
            <div class="flex justify-between items-center mb-1">
              <h2 class="font-title text-lg font-bold text-brand-dark">La Mia Dispensa Fit</h2>
              <span class="text-[10px] bg-amber-100 text-amber-800 px-2.5 py-1 rounded-full font-medium">Stato Dispensa</span>
            </div>

            ${warningHtml}

            <div class="bg-white border rounded-3xl overflow-hidden shadow-xs">
              <div class="bg-slate-50 px-4.5 py-3 border-b text-[10px] font-bold uppercase tracking-wider text-slate-500 flex justify-between">
                <span>Ingrediente</span>
                <span class="pr-12 text-right">Quantità</span>
              </div>
              <div class="divide-y divide-slate-100">
                ${itemsHtml}
              </div>
            </div>
          </div>
        `;
        container.innerHTML = html;
      }

      // --- TAB TROUBLESHOOTING ---
      else if (currentTab === 'trouble') {
        let html = `
          <div class="space-y-5">
            <div class="flex justify-between items-center mb-1">
              <h2 class="font-title text-lg font-bold text-brand-dark">Spin & Troubleshooting</h2>
              <span class="text-[10px] bg-orange-100 text-orange-800 px-2.5 py-1 rounded-full font-medium">Troubleshooting</span>
            </div>

            <div class="bg-amber-50 border border-amber-200 rounded-3xl p-5 space-y-3 shadow-xs">
              <h3 class="font-title text-sm font-bold text-amber-900 flex items-center gap-1.5">
                🍇 Málaga e il Mix-In dell'Uvetta
              </h3>
              <div class="text-xs text-amber-950 space-y-2.5 leading-relaxed">
                <p>
                  Per un gelato Málaga perfetto ed evitare di spappolare le uvette, il Socio consiglia la tecnica dello <strong>Shock Termico</strong>:
                </p>
                <ol class="list-decimal pl-4 space-y-1.5">
                  <li>Ammolla le uvette nel Marsala per almeno 4 ore.</li>
                  <li>Scolale benissimo per rimuovere l'alcol in eccesso (l'alcol impedisce al gelato di indurirsi).</li>
                  <li><strong>Metti le uvette su un piattino nel freezer per 20 minuti</strong> prima dello spin.</li>
                  <li>Mantechi il gelato ("Gelato"), fai un foro al centro, versa le uvette ghiacciate e premi <strong>MIX</strong>.</li>
                </ol>
              </div>
            </div>

            <div class="space-y-4">
              <h3 class="font-title text-sm font-bold text-brand-dark">Risoluzione dei Problemi</h3>
              
              <div class="space-y-3">
                <div class="bg-white border rounded-3xl p-4.5 shadow-xs">
                  <span class="text-xs font-bold text-red-600 bg-red-50 px-2 py-0.5 rounded">Texture Sabbiosa o Cristalli?</span>
                  <p class="text-xs text-slate-800 font-semibold mt-1">
                    💡 Soluzione: Attiva sempre il Neutro SaporePuro in liquidi caldi a 75°C-85°C frullando col mixer a immersione per formare il gel. Aggiungi latte in polvere magro.
                  </p>
                </div>

                <div class="bg-white border rounded-3xl p-4.5 shadow-xs">
                  <span class="text-xs font-bold text-amber-600 bg-amber-50 px-2 py-0.5 rounded">Gelato farinoso o sbriciolato dopo lo spin?</span>
                  <p class="text-xs text-slate-800 font-semibold mt-1">
                    💡 Soluzione: Aggiungi un cucchiaino di latte liquido al centro della pinta e lancia il programma <strong>Re-spin</strong>.
                  </p>
                </div>

                <div class="bg-white border rounded-3xl p-4.5 shadow-xs">
                  <span class="text-xs font-bold text-orange-600 bg-orange-50 px-2 py-0.5 rounded">Gelato troppo molle, non gela?</span>
                  <p class="text-xs text-slate-800 font-semibold mt-1">
                    💡 Soluzione: Rispetta la dose di 30ml di Marsala. Troppo alcol abbassa eccessivamente il punto di congelamento impedendo all'acqua di ghiacciare.
                  </p>
                </div>
              </div>
            </div>
          </div>
        `;
        container.innerHTML = html;
      }
    }

    // --- AZIONI RENDER & INTERAZIONE ---
    function selectRecipe(id) {
      selectedRecipe = initialRecipes.find(r => r.id === id);
      completedSteps = {};
      render();
    }

    function setSelectedRecipe(val) {
      selectedRecipe = val;
      render();
    }

    function triggerAddPint(recipeId, forceName) {
      let pintaName = '';
      if (forceName) {
        pintaName = forceName;
      } else {
        const input = document.getElementById('input-pinta-name');
        pintaName = input ? input.value : '';
      }
      handleAddPint(recipeId, pintaName);
    }

    function triggerAddPintManual() {
      const select = document.getElementById('select-pinta-recipe');
      const input = document.getElementById('input-pinta-name-manual');
      const recipeId = select ? select.value : '';
      const name = input ? input.value : '';
      handleAddPint(recipeId, name);
    }

    function changeQty(id, delta) {
      const ing = ingredients.find(i => i.id === id);
      if (ing) {
        const newQty = Math.max(0, ing.quantity + delta);
        handleUpdateQuantity(id, newQty);
        document.getElementById(`qty-display-${id}`).innerText = newQty;
      }
    }

    // Timer Interval per i secondi del freezer
    setInterval(() => {
      if (currentTab === 'freezer') {
        render();
      }
    }, 1000);

    // Inizializza
    initData();
    render();
  </script>
</body>
</html>
