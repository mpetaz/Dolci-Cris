    let currentSection = 'recipes';

    function checkForUpdates() {
      // Esegui il controllo in background dopo un breve ritardo per non bloccare l'interfaccia iniziale
      setTimeout(() => {
        const path = window.location.pathname;
        const buster = Date.now();
        fetch(`${path}?cb=${buster}`, { cache: 'no-store' })
          .then(response => {
            if (!response.ok) throw new Error('Errore di rete');
            return response.text();
          })
          .then(html => {
            // Cerca la definizione di APP_VERSION nel codice scaricato dal server
            const match = html.match(/const\s+APP_VERSION\s*=\s*["']([^"']+)["']/);
            if (match && match[1]) {
              const serverVersion = match[1];
              if (serverVersion !== APP_VERSION) {
                console.log(`Rilevata nuova versione: ${serverVersion}. Ricarico...`);
                const url = new URL(window.location.href);
                url.searchParams.set('v', serverVersion);
                window.location.href = url.toString();
              }
            }
          })
          .catch(err => console.log('Controllo aggiornamenti offline o non riuscito:', err));
      }, 1500);
    }

            const catInfo = getRecipeCategoryInfo(recipe);
            cards += `
              <div onclick="openRecipeModal('${recipe.id}')" class="p-5 bg-white border-2 border-slate-200 rounded-3xl shadow-sm hover:shadow-md active:scale-[0.98] transition-all cursor-pointer space-y-4">
                <div class="flex justify-between items-center">
                  <span class="px-2.5 py-0.5 bg-slate-100 text-brand-dark rounded-md text-[11px] font-extrabold uppercase font-mono tracking-wider">${recipe.programUsed}</span>
                  <span class="text-sm font-bold ${catInfo.textClass} ${catInfo.lightBgClass} px-2.5 py-1 rounded-full">
                    ${catInfo.labelEmoji} ${recipe.protein}
                  </span>
                </div>
                
                <div class="space-y-2">
                  <h3 class="font-title text-lg font-bold leading-tight ${catInfo.bgClass} px-3.5 py-2.5 rounded-2xl shadow-sm border border-black/5">${recipe.title}</h3>
                  <p class="text-sm text-slate-500 mt-1 line-clamp-2 leading-relaxed px-1">${recipe.description}</p>
                </div>

                <div class="pt-3 border-t border-slate-100 flex justify-between items-center px-1">
                  <span class="text-xs font-bold text-slate-400 font-mono">${recipe.kcal}</span>
                  <span class="text-sm font-bold text-brand-accent flex items-center gap-0.5">Apri ricetta →</span>
                </div>
              </div>
            `;
          });
        }

        content.innerHTML = `
          <div class="space-y-5">
            <h2 class="font-title text-2xl font-bold text-brand-dark">La Pasticceria Golosa</h2>
            <div class="space-y-4">
              ${cards}
            </div>
          </div>
        `;
      }

      // --- TAB 3: DOCUMENTI (CAMBUSA, GARANZIE E INFOGRAFICHE PDF) ---
      else if (currentSection === 'documents') {
        content.innerHTML = `
          <div class="space-y-5">
            <h2 class="font-title text-2xl font-bold text-brand-dark">Documenti & Info</h2>
            
            <div class="space-y-4">
              <!-- La Cambusa -->
              <div onclick="openDocumentModal('cambusa')" class="p-5 bg-white border-2 border-slate-200 rounded-3xl shadow-sm hover:shadow-md active:scale-[0.98] transition-all cursor-pointer flex items-center justify-between">
                <div class="space-y-1">
                  <h3 class="font-title text-lg font-bold text-brand-dark flex items-center gap-2">
                    🛒 La Cambusa (Ingredienti)
                  </h3>
                  <p class="text-sm text-slate-500">
                    La lista degli ingredienti attivi e come usarli.
                  </p>
                </div>
                <span class="text-brand-accent text-xl font-bold">→</span>
              </div>

              <!-- Macchine & Garanzie -->
              <div onclick="openDocumentModal('machines-warranties')" class="p-5 bg-white border-2 border-slate-200 rounded-3xl shadow-sm hover:shadow-md active:scale-[0.98] transition-all cursor-pointer flex items-center justify-between">
                <div class="space-y-1">
                  <h3 class="font-title text-lg font-bold text-brand-dark flex items-center gap-2">
                    🔌 Macchine & Garanzie
                  </h3>
                  <p class="text-sm text-slate-500">
                    Dettagli delle apparecchiature e documenti di garanzia.
                  </p>
                </div>
                <span class="text-brand-accent text-xl font-bold">→</span>
              </div>

              <!-- Infografica Ufficiale Volume 1 -->
              <a href="moulinex%20dolci%20ricette%20fit.pdf" target="_blank" class="p-5 bg-white border-2 border-slate-200 rounded-3xl shadow-sm hover:shadow-md active:scale-[0.98] transition-all cursor-pointer flex items-center justify-between block">
                <div class="space-y-1">
                  <h3 class="font-title text-lg font-bold text-brand-dark flex items-center gap-2">
                    📊 Infografica Ricette Fit Vol. 1
                  </h3>
                  <p class="text-sm text-slate-500">
                    Apri la prima infografica generata dal Socio.
                  </p>
                </div>
                <span class="text-emerald-500 text-xl font-bold">↓</span>
              </a>

              <!-- Infografica Ufficiale Volume 2 -->
              <a href="moulinex%20dolci%20ricette%20fit_2.pdf" target="_blank" class="p-5 bg-white border-2 border-slate-200 rounded-3xl shadow-sm hover:shadow-md active:scale-[0.98] transition-all cursor-pointer flex items-center justify-between block">
                <div class="space-y-1">
                  <h3 class="font-title text-lg font-bold text-brand-dark flex items-center gap-2">
                    📊 Infografica Ricette Fit Vol. 2
                  </h3>
                  <p class="text-sm text-slate-500">
                    Apri la seconda infografica generata dal Socio.
                  </p>
                </div>
                <span class="text-emerald-500 text-xl font-bold">↓</span>
              </a>
            </div>
          </div>
        `;
      }
    }

    // Avvio
    init();
  </script>
