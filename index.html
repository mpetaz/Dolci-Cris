    let currentSection = 'recipes';

    // Inizializzazione
    function init() {
      selectSection('recipes');
    }

    // Navigazione
    function selectSection(sectionId) {
      currentSection = sectionId;
      
      const sections = ['recipes', 'dolci', 'documents'];
      sections.forEach(s => {
        const btn = document.getElementById(`btn-sec-${s}`);
        if (btn) {
          if (s === sectionId) {
            btn.className = "touch-target py-5 px-3 rounded-2xl bg-brand-dark text-white font-title font-bold text-lg flex flex-col items-center justify-center gap-2 border-2 border-brand-dark shadow-md active:scale-95 transition-all";
          } else {
            btn.className = "touch-target py-5 px-3 rounded-2xl bg-slate-100 text-brand-dark font-title font-bold text-lg flex flex-col items-center justify-center gap-2 border-2 border-slate-200 active:scale-95 transition-all";
          }
        }
      });

      // Gestione pulsante documenti per l'estetica
      const btnDoc = document.getElementById('btn-sec-documents');
      if (sectionId === 'documents') {
        btnDoc.className = "touch-target py-5 px-3 rounded-2xl bg-brand-dark text-white font-title font-bold text-lg flex flex-col items-center justify-center gap-2 border-2 border-brand-dark shadow-md active:scale-95 transition-all";
      } else {
        btnDoc.className = "touch-target py-5 px-3 rounded-2xl bg-slate-100 text-brand-dark font-title font-bold text-lg flex flex-col items-center justify-center gap-2 border-2 border-slate-200 active:scale-95 transition-all";
      }

      render();
    }

    // Apri Dettaglio Ricetta
    function openRecipeModal(recipeId) {
      const recipe = initialRecipes.find(r => r.id === recipeId);

      const modal = document.getElementById('recipe-modal');
      const content = document.getElementById('modal-content-area');

      let ingList = '';
      recipe.ingredients.forEach(ing => {
        ingList += `
          <div class="flex justify-between py-2.5 border-b text-xl border-slate-100">
            <span class="font-medium text-slate-800">${ing.name}</span>
            <span class="font-bold text-brand-dark bg-slate-50 border border-slate-200 px-3.5 py-0.5 rounded-xl">
              ${ing.quantity}${ing.unit}
            </span>
          </div>
        `;
      });

      let stepsList = '';
      recipe.steps.forEach((step, idx) => {
        stepsList += `
          <div class="flex gap-3 text-lg leading-relaxed text-slate-800">
            <span class="text-brand-accent font-extrabold text-xl">${idx + 1}.</span>
            <p class="font-medium">${step}</p>
          </div>
        `;
      });

      content.innerHTML = `
        <div class="space-y-6">
          <div class="mt-2">
            <span class="px-3 py-1 bg-brand-dark text-white rounded-full text-xs font-bold uppercase tracking-wider">${recipe.category}</span>
            <h2 class="font-title text-3xl font-bold text-brand-dark mt-3 leading-tight">${recipe.title}</h2>
            <p class="text-base text-slate-500 mt-1">${recipe.description}</p>
          </div>

          <!-- MACROS GRANDI -->
          <div class="grid grid-cols-2 gap-4 bg-slate-50 p-4.5 rounded-2xl border border-slate-200">
            <div class="text-center">
              <span class="text-xs text-slate-400 font-bold uppercase">${recipe.section === 'recipes' ? 'Proteine' : 'Base'}</span>
              <span class="block text-xl font-extrabold text-brand-dark truncate">${recipe.protein}</span>
            </div>
            <div class="text-center border-l border-slate-200">
              <span class="text-xs text-slate-400 font-bold uppercase">${recipe.section === 'recipes' ? 'Calorie' : 'Autore'}</span>
              <span class="block text-xl font-extrabold text-brand-dark truncate">${recipe.kcal}</span>
            </div>
          </div>

          <!-- INGREDIENTI -->
          <div class="space-y-3">
            <h3 class="font-title text-xl font-bold text-brand-dark flex items-center gap-2">
              📋 Ingredienti Necessari
            </h3>
            <div class="space-y-1">
              ${ingList}
            </div>
          </div>

          <!-- PROCEDIMENTO -->
          <div class="space-y-4">
            <h3 class="font-title text-xl font-bold text-brand-dark">
              ⚡ Procedimento Passo-Passo
            </h3>
            <div class="space-y-4">
              ${stepsList}
            </div>
          </div>

          <!-- CHICCHE E TIPS -->
          <div class="bg-accent-orange/15 border-2 border-accent-orange/30 p-5 rounded-2xl space-y-2">
            <h4 class="font-title font-bold text-lg text-brand-dark flex items-center gap-1.5">
              💡 Chicche e Tips del Socio
            </h4>
            <p class="text-base text-slate-800 leading-relaxed font-semibold">
